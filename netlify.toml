[build]
  publish = "public"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: 'unsafe-inline' is required for script-src because the app uses hundreds of inline
    # event handlers (onclick, onmouseenter, etc.) in dynamically generated HTML — hashing them
    # is impractical. XSS protection comes from escapeHtml() on all DB-sourced content instead.
    # Remaining CSP directives (connect-src, frame-src, object-src, base-uri) still provide value.
    # Clerk requires worker-src blob: for its authentication web worker.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://*.clerk.accounts.dev https://clerk.algotracker.xyz; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://clerk.algotracker.xyz https://api.openai.com https://cdn.jsdelivr.net; img-src 'self' data: https:; media-src https://res.cloudinary.com; frame-src 'none'; object-src 'none'; base-uri 'self'; worker-src blob: 'self';"

# Prevent browsers from caching API responses
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, private"
    Pragma = "no-cache"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
