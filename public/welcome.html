<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --surface2:#18181f;
    --border:  #2a2a38;
    --text:    #e8e8f0;
    --text-dim:#9898b0;
    --text-muted:#6b6b85;
    --accent:  #7c6af7;
    --easy:    #06d6a0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100svh;

  .card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin: 24px 16px;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--easy));
  }

  .logo {
    font-size: 36px;
    margin-bottom: 20px;
    display: block;

  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;

    flex-direction: column;
    gap: 12px;

    letter-spacing: 0.03em;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;

  button:active { transform: scale(0.98); }

<body>

<div class="card">
  <span class="logo">⚡</span>
  <h1>AlgoTracker</h1>
  <p class="tagline">Track problems · Analyze solutions<br>Master algorithms · Stay consistent</p>

  <div class="actions">
    <button id="btn-signin" onclick="handleSignIn()">Sign In</button>
    <button id="btn-signup" onclick="handleSignUp()">Create Account</button>
  </div>

  <p class="footer" style="text-transform: none; letter-spacing: 0;">AlgoTracker &copy; Created by <a href="https://arindamparia.in" target="_blank" style="color: var(--text-muted); text-decoration: none; border-bottom: 1px dotted var(--text-muted);">Arindam Paria</a></p>
</div>

<script>
  const PK_TTL = 5 * 60 * 1000;
  const _pkPromise = (() => {
    try {
      const cached = JSON.parse(sessionStorage.getItem('_cpk') || 'null');
      if (cached && (Date.now() - cached.t < PK_TTL)) return Promise.resolve(cached.pk);
    } catch {}
    return fetch('/.netlify/functions/clerk-config')
      .then(r => r.json())
      .then(({ pk }) => {
        if (pk) sessionStorage.setItem('_cpk', JSON.stringify({ pk, t: Date.now() }));
        return pk || '';
      })
      .catch(() => '');
  })();

  let _clerkPromise = null;

  function loadClerk() {
    if (_clerkPromise) return _clerkPromise;
    _clerkPromise = _pkPromise.then(PK => new Promise((resolve, reject) => {
      if (!PK || PK.startsWith('REPLACE')) { resolve(null); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
      s.setAttribute('data-clerk-publishable-key', PK);
      s.crossOrigin = 'anonymous';
      s.onload = async () => {
        const clerk = window.Clerk;
        await clerk.load();
        if (clerk.user) { window.location.replace('/'); return; }
        resolve(clerk);
      };
      s.onerror = () => reject(new Error('Failed to load Clerk'));
      document.head.appendChild(s);
    }));
    return _clerkPromise;
  }

  // Eagerly start full Clerk load so redirect happens without waiting for a button click
  loadClerk().catch(() => {});

  async function handleSignIn() {
    const btn = document.getElementById('btn-signin');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    try {
      const clerk = await loadClerk();
      if (clerk) clerk.redirectToSignIn({ fallbackRedirectUrl: window.location.origin + '/' });
    } catch {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleSignUp() {
    const btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    try {
      const clerk = await loadClerk();
      if (clerk) clerk.redirectToSignUp({ fallbackRedirectUrl: window.location.origin + '/' });
    } catch {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
